services:
  mcp-filesystem:
    image: node:20-alpine
    command:
      - sh
      - -c
      - >
        npx -y mcp-proxy --port 8081 --server stream --streamEndpoint /mcp --stateless --
        npx -y @modelcontextprotocol/server-filesystem /projects/reservation_status
    volumes:
      - ./runtime/reservation_status:/projects/reservation_status
    restart: unless-stopped

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    hostname: node1
    ports:
      - "8080:8080"   # REST API
      - "50051:50051" # gRPC
    volumes:
      - ./.docker-data/weaviate:/var/lib/weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - ./.docker-data/postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: parking
      POSTGRES_USER: parking
      POSTGRES_PASSWORD: parking
    restart: unless-stopped

  parking-bot:
    build: .
    # Development: mount source to pick up code changes without rebuild.
    # After adding/changing this volume, run: docker compose up -d --force-recreate parking-bot
    volumes:
      - ./runtime:/app/runtime
      - ./src:/app/src
    depends_on:
      - mcp-filesystem
      - postgres
      - weaviate
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      WEAVIATE_URL: http://weaviate:8080
      WEAVIATE_HTTP_HOST: weaviate
      WEAVIATE_GRPC_HOST: weaviate
      MCP_FILESYSTEM_URL: http://mcp-filesystem:8081/mcp
      MCP_RESERVATION_STATUS_DIR: /projects/reservation_status
    restart: unless-stopped
